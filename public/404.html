<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Glaucia Silva Bierwagen Portfolio</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect trick.
      // Keeps 1 path segment (/glaucia_portfolio) and encodes the rest as a query string
      // so index.html can restore the correct route via history.replaceState.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
